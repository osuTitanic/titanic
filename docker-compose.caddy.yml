services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME}
    ports:
      - "${CADDY_HTTP_HOST-0.0.0.0}:${CADDY_HTTP_PORT-80}:80"
      - "${CADDY_HTTPS_HOST-0.0.0.0}:${CADDY_HTTPS_PORT-443}:443"
    networks:
      - titanic
    volumes:
      - "./services/caddy/Caddyfile:/etc/caddy/Caddyfile:ro"
      - "./.data/caddy/data:/data"
      - "./.data/caddy/config:/config"
