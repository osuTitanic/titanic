services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      - PGUSER=${POSTGRES_USER}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_PORT=${POSTGRES_PORT}
    ports:
      - "127.0.0.1:${POSTGRES_PORT}:5432"
    volumes:
      - "./.data/postgres:/var/lib/postgresql/data"
    networks:
      - titanic
    healthcheck:
      test: ["CMD", "pg_isready"]
      interval: 5s
      timeout: 5s
      retries: 15
    ulimits:
      nofile:
        soft: 8192
        hard: 32456

  migrations:
    image: migrate/migrate
    restart: no
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - "./migrations:/migrations"
    networks:
      - titanic
    command: -path=/migrations/ -database postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_USER}?sslmode=disable up

  cache:
    image: redis:8
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_PORT}:6379"
    command: redis-server --save 20 1 --dir /data
    networks:
      - titanic
    volumes:
      - "./.data/redis/data:/data"
      - "./.data/redis/config:/usr/local/etc/redis"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  anchor:
    build: ./services/bancho
    restart: unless-stopped
    env_file:
      - ".env"
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_HOST=cache
      - REDIS_PORT=6379
      - BANCHO_HTTP_PORT=80
      - BANCHO_IRC_PORT=6667
      - BANCHO_TCP_PORTS=[13380, 13381, 13382, 13383, 13384]
    networks:
      - titanic
    ports:
      # Uncomment to access http bancho from outside
      # - 127.0.0.1:5050:80
      - 6667:6667
      - 5001:5001
      - 13380:13380
      - 13381:13381
      - 13382:13382
      - 13383:13383
      - 13384:13384
    volumes:
      - "./.data:/bancho/.data"
      - "./.data/logs/bancho:/bancho/logs"
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    ulimits:
      nofile:
        soft: 16384
        hard: 32768
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  deck:
    build: ./services/deck
    restart: unless-stopped
    env_file:
      - ".env"
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_HOST=cache
      - REDIS_PORT=6379
    networks:
      - titanic
    # ports:
    # Uncomment to access deck from outside
    # - 127.0.0.1:6060:80
    volumes:
      - "./.data:/deck/.data"
      - "./.data/logs/deck:/deck/logs"
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10

  bot:
    build: ./services/bot
    restart: on-failure
    env_file:
      - ".env"
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_HOST=cache
      - REDIS_PORT=6379
    networks:
      - titanic
    volumes:
      - "./.data:/bot/.data"
      - "./.data/logs/bot:/bot/logs"
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

  stern:
    image: ghcr.io/osutitanic/stern:latest
    build:
      context: .
      dockerfile: ./services/stern/Dockerfile
    restart: unless-stopped
    env_file:
      - ".env"
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_HOST=cache
      - REDIS_PORT=6379
      - FRONTEND_HOST=0.0.0.0
      - FRONTEND_PORT=80
    networks:
      - titanic
    # ports:
    # Uncomment to access stern from outside
    # - 127.0.0.1:7070:80
    volumes:
      - "./services/stern/web/static:/app/static:ro"
      - "./.data:/app/.data"
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/app/stern", "healthcheck", "http://127.0.0.1:80/"]
      start_period: 30s
      interval: 5m
      timeout: 5s
      retries: 5

  jobs:
    image: ghcr.io/osutitanic/jobs:latest
    build:
      context: .
      dockerfile: ./services/jobs/Dockerfile
    restart: unless-stopped
    env_file:
      - ".env"
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_HOST=cache
      - REDIS_PORT=6379
    networks:
      - titanic
    volumes:
      - "./.data:/app/.data"
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

  keel:
    build: ./services/keel
    restart: unless-stopped
    env_file:
      - ".env"
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_HOST=cache
      - REDIS_PORT=6379
    networks:
      - titanic
    # ports:
    # Uncomment to access keel from outside
    # - 127.0.0.1:8090:80
    volumes:
      - "./.data/logs/keel:/keel/logs"
      - "./.data:/keel/.data"
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/stats || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10

networks:
  titanic:
    driver: bridge
