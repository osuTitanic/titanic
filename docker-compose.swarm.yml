version: "3.9"

services:
  db:
    image: postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_PORT=${POSTGRES_PORT}
    ports:
      - '127.0.0.1:${POSTGRES_PORT}:5432'
    volumes:
      - './.data/postgres:/var/lib/postgresql/data'
    networks:
      - titanic
    healthcheck:
      test: ["CMD", "pg_isready"]
      interval: 5s
      timeout: 5s
      retries: 15

  cache:
    image: redis:8
    restart: unless-stopped
    ports:
      - '127.0.0.1:${REDIS_PORT}:6379'
    command: redis-server --save 20 1
    networks:
      - titanic
    volumes:
      - './.data/redis/data:/root/redis'
      - './.data/redis/config:/usr/local/etc/redis'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrations:
    image: migrate/migrate
    restart: "no"
    volumes:
      - './migrations:/migrations'
    networks:
      - titanic
    command: >
      -path=/migrations/
      -database postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_USER}?sslmode=disable up

  deck:
    build: ./web/deck
    restart: unless-stopped
    env_file:
      - '.env'
    environment:
      - POSTGRES_HOST=db
      - REDIS_HOST=cache
      - OSZ2_SERVICE_URL=http://osz2-service:8080
    networks:
      - titanic
    volumes:
      - './.data:/deck/.data'
      - './.data/logs/deck:/deck/logs'
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost || exit 1"]
      interval: 15s
      timeout: 4s
      retries: 5
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 5s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    entrypoint: ["./wait-for-deps.sh"]

  stern:
    build: ./web/stern
    restart: unless-stopped
    env_file:
      - '.env'
    environment:
      - POSTGRES_HOST=db
      - REDIS_HOST=cache
    networks:
      - titanic
    volumes:
      - './.data/logs/stern:/stern/logs'
      - './.data:/stern/.data'
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost || exit 1"]
      interval: 15s
      timeout: 4s
      retries: 4
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 5s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    entrypoint: ["./wait-for-deps.sh"]

  keel:
    build: ./web/keel
    restart: unless-stopped
    env_file:
      - '.env'
    environment:
      - POSTGRES_HOST=db
      - REDIS_HOST=cache
    networks:
      - titanic
    volumes:
      - './.data/logs/keel:/keel/logs'
      - './.data:/keel/.data'
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/stats || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 4
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 5s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    entrypoint: ["./wait-for-deps.sh"]

  nginx:
    image: nginx:latest
    restart: unless-stopped
    env_file:
      - '.env'
    environment:
      - DOLLAR=$$
    ports:
      - "${NGINX_HOST}:${NGINX_PORT}:80"
    networks:
      - titanic
    volumes:
      - './web/nginx/templates:/etc/nginx/templates'
      - './web/nginx/nginx.conf:/etc/nginx/nginx.conf'
    command: /bin/bash -c "envsubst < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"

  osz2-service:
    build: ./web/osz2-service
    restart: unless-stopped
    networks:
      - titanic

networks:
  titanic:
    driver: overlay